<!DOCTYPE html>
<html>
<head>
<title> Delivery Time predictor </title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>

<body>

<div class="container">
<div class="title-frame">
<h1> 🚚 Delivery Time predictor </h1>
</div>



<form action="/predict" method="post">

<label>Product Category</label>
<select name="product_category">
<option>Electronics</option>
<option>Clothing</option>
<option>Furniture</option>
</select>

<label>Warehouse Location</label>
<select name="warehouse">
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
</select>

<label>Shipment Mode</label>
<select name="shipment_mode">
<option>Air</option>
<option>Road</option>
<option>Sea</option>
</select>

<label>Product Weight(kg)</label>
<input type="number" step="0.1" name="weight" placeholder="Enter weight in kg" required>

<label>Demand Forecast Units</label>
<input type="number" name="demand" required>

<label>Shipping Cost</label>
<input type="number" name="cost" required>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
